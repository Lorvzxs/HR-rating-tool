<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMDO ASUNCION</title>
    <style>
        :root { 
            --sidebar-blue: #1e3a8a; /* Navy Blue */
            --primary-blue: #2563eb; /* Royal Blue */
            --bg-light: #f8fafc; 
            --text-dark: #334155; 
            --accent-blue: #60a5fa; /* Light Blue */
        }

        /* --- Rectangle Selection Color --- */
        ::selection { background-color: var(--primary-blue); color: white; }
        ::-moz-selection { background-color: var(--primary-blue); color: white; }

        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg-light); overflow: hidden; }
        
        /* --- Top Header --- */
        .jobsync-header {
            background: white; height: 70px; display: flex; align-items: center;
            padding: 0 40px; border-bottom: 1px solid #e2e8f0; z-index: 10000; position: relative;
        }
        .js-brand { display: flex; align-items: center; gap: 12px; }
        .js-brand img { width: 35px; height: auto; }
        .js-brand-text h1 { margin: 0; font-size: 1.3rem; font-weight: 800; color: #1e3a8a; line-height: 1; }
        .js-brand-text p { margin: 2px 0 0; font-size: 0.7rem; color: #64748b; font-weight: 500; }

        /* --- Welcome Screen --- */
        #welcome-screen {
            position: fixed; top: 70px; left: 0; width: 100%; height: calc(100% - 70px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background: #1e3a8a; /* Blue Base */
        }
        #welcome-screen::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('1.JPG'); background-size: cover; background-position: center;
            opacity: 0.2; z-index: -3; 
        }
        #bg-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.35; z-index: -2; }

        .welcome-card {
            background: rgba(255, 255, 255, 0.1); 
            padding: 50px; border-radius: 40px; 
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px; width: 90%; text-align: center;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .welcome-card img { width: 180px; margin-bottom: 20px; }
        .welcome-card h2 { font-size: 1.8rem; margin: 0 0 10px; color: #ffffff; font-weight: 800; }
        
        .btn-get-started { 
            background: #2563eb; color: white; border: none; padding: 15px 50px; 
            border-radius: 50px; font-weight: 700; cursor: pointer; font-size: 1.1rem; 
            transition: 0.3s; margin-top: 20px;
        }
        .btn-get-started:hover { transform: scale(1.05); background: #3b82f6; }

        /* --- Sidebar & Layout --- */
        .app-container { display: flex; flex: 1; height: calc(100vh - 70px); overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar-blue); color: white; display: flex; flex-direction: column; }
        .menu-item { padding: 18px 25px; cursor: pointer; border-left: 4px solid transparent; color: rgba(255,255,255,0.7); transition: 0.2s; }
        .menu-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .menu-item.active { background: #1e40af; border-left-color: #60a5fa; color: white; font-weight: bold; }
        
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .page { display: none; }
        .page.active { display: block; }
        
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        label { font-weight: 600; font-size: 0.8rem; display: block; margin-bottom: 8px; color: #64748b; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 0.8rem; color: #475569; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; }

        .total-banner { background: var(--sidebar-blue); color: white; padding: 20px; border-radius: 10px; text-align: center; margin-top: 25px; }
        .total-num { font-size: 2.5rem; color: #93c5fd; display: block; font-weight: 800; }
        
        /* Blue Submit Button */
        .btn-save { width: 100%; background: #2563eb; color: white; border: none; padding: 18px; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-save:hover { background: #1e40af; transform: translateY(-2px); }

        .slide-up { transform: translateY(-120%); }
    </style>
</head>
<body>

    <header class="jobsync-header">
        <div class="js-brand">
            <img src="hr.png" alt="JobSync Logo">
            <div class="js-brand-text">
                <h1>Human Resource Management Office</h1>
                <p>Municipality of Asuncion</p>
            </div>
        </div>
    </header>

    <div id="welcome-screen">
        <video autoplay muted loop id="bg-video">
            <source src="bg.mp4" type="video/mp4">
        </video>
        <div class="welcome-card">
            <img src="LOGO.png" alt="Official Seal">
            <h2>Behavioral Event Interview <br>Rating Tool</h2>
            <button class="btn-get-started" onclick="startApp()">GET STARTED</button>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div style="padding: 25px; font-size: 0.7rem; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase;">Menu</div>
            <div class="menu-item active" onclick="showPage('rating', this)">Rating Tool</div>
            <div class="menu-item" onclick="showPage('analytics', this)">Records</div>
        </aside>

        <main class="main-content">
            <div id="rating" class="page active">
                <h1 style="color: #1e3a8a;">Interview Assessment</h1>
                <div class="card">
                    <div class="grid">
                        <div><label>Applicant Name</label><input type="text" id="name" placeholder="Full Name"></div>
                        <div>
                            <label>Position Applied For</label>
                            <select id="pos">
                                <option value="">Select Position</option>
                                <option value="HUMAN RESOURCE MANAGEMENT V">HUMAN RESOURCE MANAGEMENT V</option>
                                <option value="Administrative Officer III">Administrative Officer III</option>
                                <option value="Administrative Officer I">Administrative Officer I</option>
                                <option value="Medical Officer IV">Medical Officer IV</option>
                                <option value="Midwife II">Midwife II</option>
                            </select>
                        </div>
                        <div><label>Interviewer Name</label><input type="text" id="int" placeholder="Interviewer Name"></div>
                        <div><label>Date</label><input type="date" id="date"></div>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th>Criteria</th>
                                <th style="width: 150px; text-align: center;">Score (1-5)</th>
                            </tr>
                        </thead>
                        <tbody id="rubric-body"></tbody>
                    </table>

                    <div class="total-banner">
                        FINAL RATING SCORE
                        <span class="total-num" id="total-val">0</span>
                    </div>

                    <button class="btn-save" id="saveBtn" onclick="submitData()">SUBMIT</button>
                </div>
            </div>
            
            <div id="analytics" class="page">
                <h1 style="color: #1e3a8a;">Assessment Records</h1>
                <div class="card">
                    <table style="text-align: left;">
                        <thead>
                            <tr style="color: #64748b;">
                                <th>Applicant</th>
                                <th>Position</th>
                                <th>Interviewer</th>
                                <th>Score</th>
                            </tr>
                        </thead>
                        <tbody id="history-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

<script>
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbxeQcHKe31bZxiXArIaYp9yZpK07VEidDE_oMsQwpsw6_4aCfiuP9MRp4ol5tNrFZKl/exec";

    const criteria = [
        { name: "Communication Skills", desc: "Ideas clearly, confidently, and persuasively." },
        { name: "Job Knowledge", desc: "Understanding of functions and procedures." },
        { name: "Work Experience", desc: "Relevant background and accomplishments." },
        { name: "Problem Solving", desc: "Logical analysis and ethical solutions." },
        { name: "Commitment to Service", desc: "RA 6713 values and integrity." },
        { name: "Interpersonal Relations", desc: "Harmonious work and respect." },
        { name: "Professional Demeanor", desc: "Confidence, enthusiasm, and poise." }
    ];

    function startApp() { document.getElementById('welcome-screen').classList.add('slide-up'); }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'analytics') { updateRecordsTable(); }
    }

    function initRubric() {
        const body = document.getElementById('rubric-body');
        body.innerHTML = "";
        criteria.forEach((c, i) => {
            body.innerHTML += `<tr><td><strong>${i+1}. ${c.name}</strong><br><small style="color: #94a3b8;">${c.desc}</small></td>
                <td><select class="score" onchange="calc()"><option value="0">0</option>${[1,2,3,4,5].map(v => `<option value="${v}">${v}</option>`).join('')}</select></td></tr>`;
        });
        document.getElementById('date').valueAsDate = new Date();
    }

    function calc() {
        let total = 0;
        document.querySelectorAll('.score').forEach(s => total += parseInt(s.value));
        document.getElementById('total-val').innerText = total;
    }

    function updateRecordsTable() {
        const tbody = document.getElementById('history-body');
        const myRatings = JSON.parse(localStorage.getItem('my_local_ratings')) || [];
        
        tbody.innerHTML = "";
        if (myRatings.length === 0) {
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding: 20px;'>No records found.</td></tr>";
            return;
        }

        [...myRatings].reverse().forEach(row => {
            tbody.innerHTML += `<tr>
                <td style="padding: 15px; border-bottom: 1px solid #f1f5f9;">${row.name}</td>
                <td style="padding: 15px; border-bottom: 1px solid #f1f5f9;">${row.pos}</td>
                <td style="padding: 15px; border-bottom: 1px solid #f1f5f9;">${row.int}</td>
                <td style="padding: 15px; border-bottom: 1px solid #f1f5f9; font-weight: bold; color: #2563eb;">${row.total}</td>
            </tr>`;
        });
    }

    async function submitData() {
        const btn = document.getElementById('saveBtn');
        const applicant = document.getElementById('name').value;
        const position = document.getElementById('pos').value;
        const interviewer = document.getElementById('int').value;
        const interviewDate = document.getElementById('date').value;
        const totalScore = document.getElementById('total-val').innerText;

        if(!applicant || !position || !interviewer || !interviewDate) {
            alert("Please complete the form, including the Date.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Syncing...";

        const payload = {
            name: applicant,
            pos: position,
            int: interviewer,
            date: interviewDate,
            total: totalScore
        };

        let myRatings = JSON.parse(localStorage.getItem('my_local_ratings')) || [];
        myRatings.push(payload);
        localStorage.setItem('my_local_ratings', JSON.stringify(myRatings));

        fetch(SHEET_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        });

        setTimeout(() => {
            alert("Success! Rating saved.");
            location.reload(); 
        }, 1500);
    }

    document.addEventListener('DOMContentLoaded', () => {
        initRubric();
        const savedInt = localStorage.getItem('interviewer_name');
        if (savedInt && document.getElementById('int')) { document.getElementById('int').value = savedInt; }
    });
</script>
</body>
</html>
